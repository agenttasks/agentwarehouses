repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy src/agentwarehouses/ --exclude 'generation/'
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -x -q --timeout=30
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
